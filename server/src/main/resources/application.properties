spring.application.name=CodeColabServer

# Database Configuration
# On Render, these env vars are injected from the PostgreSQL service.
# Locally, the fallback values match your dev setup.
spring.datasource.url=postgresql://cocode_user:7NIDTLdYFNX1TXYmXPW1XanhqDVd11mh@dpg-d7bumbh4tr6s73bbjim0-a/cocode_112s
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:server}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Spring AI Configuration (Groq via OpenAI-compatible API)
spring.ai.openai.api-key=${GROQ_API_KEY=YOUR_REAL_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai/v1
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# JWT Configuration
codecollab.app.jwtSecret=${JWT_SECRET:CodeColabSuperSecretKeyThatIsVeryLongAndSecureChangeMeInProd1234567890}
codecollab.app.jwtExpirationMs=86400000

# Server Port — Render injects PORT automatically; falls back to 8080 locally
server.port=PORT:8080
